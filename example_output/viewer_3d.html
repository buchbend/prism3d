const N = 16;
function generateDemoData() {
  const data = {};
  const tracers = {
    'n_H': { label: 'Density [cm⁻³]', cmap: 'viridis', log: true },
    'T_gas': { label: 'Temperature [K]', cmap: 'inferno', log: true },
    'G0': { label: 'FUV Field [Habing]', cmap: 'magma', log: true },
    'x_H2': { label: 'H₂ Fraction', cmap: 'blues', log: false },
    'x_Cp': { label: 'C⁺ Abundance', cmap: 'reds', log: true },
    'x_CO': { label: 'CO Abundance', cmap: 'greens', log: true },
    'f_nano': { label: 'Nano-grain Fraction', cmap: 'rdylgn', log: false },
    'T_dust': { label: 'Dust Temperature [K]', cmap: 'hot', log: false },
    'Gamma_PE': { label: 'PE Heating', cmap: 'hot', log: true },
  };

  // Generate fractal turbulent density
  for (const [key, meta] of Object.entries(tracers)) {
    const arr = new Float32Array(N * N * N);
    for (let ix = 0; ix < N; ix++) {
      for (let iy = 0; iy < N; iy++) {
        for (let iz = 0; iz < N; iz++) {
          const idx = ix * N * N + iy * N + iz;
          const x = ix / N, y = iy / N, z = iz / N;

          // Turbulent-ish structure
          const turb = Math.sin(x*12) * Math.cos(y*8) * Math.sin(z*10)
                     + 0.5 * Math.sin(x*5+y*7) * Math.cos(z*6)
                     + 0.3 * Math.sin(x*20) * Math.sin(y*15+z*12);

          switch(key) {
            case 'n_H':
              arr[idx] = Math.exp(5.5 + 2.0 * turb); // 100-10000 cm-3
              break;
            case 'T_gas':
              const av_proxy = x * 3;
              arr[idx] = 50 + 5000 * Math.exp(-av_proxy) * (1 + 0.3 * turb);
              break;
            case 'G0':
              arr[idx] = 500 * Math.exp(-1.8 * x * 4) * (1 + 0.2 * turb);
              break;
            case 'x_H2':
              arr[idx] = 0.5 / (1 + Math.exp(-(x * 8 - 3 + turb)));
              break;
            case 'x_Cp':
              arr[idx] = 1.4e-4 / (1 + Math.exp((x * 8 - 4 + turb)));
              break;
            case 'x_CO':
              arr[idx] = 1.4e-4 / (1 + Math.exp(-(x * 8 - 5 + turb)));
              break;
            case 'f_nano':
              arr[idx] = 0.7 + 0.3 * Math.exp(-x * 2) * (1 + 0.1 * turb);
              break;
            case 'T_dust':
              arr[idx] = 15 + 40 * Math.exp(-x * 3) * (1 + 0.1 * turb);
              break;
            case 'Gamma_PE':
              const g0_loc = 500 * Math.exp(-1.8 * x * 4);
              const n_loc = Math.exp(5.5 + 2.0 * turb);
              arr[idx] = 1e-24 * g0_loc * n_loc * 0.03;
              break;
          }
        }
      }
    }
    data[key] = { values: arr, ...meta };
  }
  return data;
}

function sampleColormap(name, t) {
  const cm = COLORMAPS[name] || COLORMAPS.viridis;

    cm[i0][1] * (1-f) + cm[i1][1] * f,
    cm[i0][2] * (1-f) + cm[i1][2] * f,

  let vmin = Infinity, vmax = -Infinity;
  for (let i = 0; i < values.length; i++) {
    const v = useLog ? Math.log10(Math.max(values[i], 1e-30)) : values[i];
    if (isFinite(v)) {
      vmin = Math.min(vmin, v);
      vmax = Math.max(vmax, v);
    }
  }
  if (vmax <= vmin) vmax = vmin + 1;

  // Update colorbar
  updateColorbar(tracer.label, vmin, vmax, cmap, useLog);

  const cellSize = 1.0 / N;
  const halfCell = cellSize * 0.48;

  if (viewMode === 'volume') {
    // Volume: all cells as semi-transparent cubes
    const geo = new THREE.BoxGeometry(cellSize * 0.95, cellSize * 0.95, cellSize * 0.95);

    for (let ix = 0; ix < N; ix++) {
      for (let iy = 0; iy < N; iy++) {
        for (let iz = 0; iz < N; iz++) {
          const idx = ix * N * N + iy * N + iz;
          const raw = values[idx];
          const v = useLog ? Math.log10(Math.max(raw, 1e-30)) : raw;
          const t = (v - vmin) / (vmax - vmin);

          const [r, g, b] = sampleColormap(cmap, t);
          const alpha = t * opacityScale * brightnessScale;

          if (alpha < 0.01) continue;

          const mat = new THREE.MeshLambertMaterial({
            color: new THREE.Color(r/255, g/255, b/255),
            transparent: true,
            opacity: Math.min(alpha, 0.95),
            depthWrite: false,
          });

          const mesh = new THREE.Mesh(geo, mat);
          mesh.position.set(
            (ix + 0.5) / N - 0.5,
            (iy + 0.5) / N - 0.5,
            (iz + 0.5) / N - 0.5
          );
          volumeGroup.add(mesh);
        }
      }
    }
  } else if (viewMode.startsWith('slice')) {
    // Slice view
    const axis = viewMode === 'slice-x' ? 0 : viewMode === 'slice-y' ? 1 : 2;
    const sliceIdx = Math.floor(slicePosition * (N - 1));
    const geo = new THREE.PlaneGeometry(cellSize * 0.95, cellSize * 0.95);

    for (let a = 0; a < N; a++) {
      for (let b = 0; b < N; b++) {
        let ix, iy, iz;
        if (axis === 0) { ix = sliceIdx; iy = a; iz = b; }
        else if (axis === 1) { ix = a; iy = sliceIdx; iz = b; }
        else { ix = a; iy = b; iz = sliceIdx; }

        const idx = ix * N * N + iy * N + iz;
        const raw = values[idx];
        const v = useLog ? Math.log10(Math.max(raw, 1e-30)) : raw;
        const t = (v - vmin) / (vmax - vmin);
        const [r, g, b2] = sampleColormap(cmap, t);

        const mat = new THREE.MeshBasicMaterial({
          color: new THREE.Color(r/255, g/255, b2/255),
          side: THREE.DoubleSide,
        });
        const mesh = new THREE.Mesh(geo, mat);

        if (axis === 0) {
          mesh.rotation.y = Math.PI / 2;
          mesh.position.set((sliceIdx + 0.5)/N - 0.5, (a+0.5)/N-0.5, (b+0.5)/N-0.5);
        } else if (axis === 1) {
          mesh.rotation.x = Math.PI / 2;
          mesh.position.set((a+0.5)/N-0.5, (sliceIdx+0.5)/N-0.5, (b+0.5)/N-0.5);
        } else {
          mesh.position.set((a+0.5)/N-0.5, (b+0.5)/N-0.5, (sliceIdx+0.5)/N-0.5);
        }
        volumeGroup.add(mesh);
      }
    }
  } else if (viewMode === 'iso') {
    // Isosurface: show only cells near the threshold
    const threshold = vmin + isoLevel * (vmax - vmin);
    const width = (vmax - vmin) * 0.08;
    const geo = new THREE.BoxGeometry(cellSize * 0.95, cellSize * 0.95, cellSize * 0.95);

    for (let ix = 0; ix < N; ix++) {
      for (let iy = 0; iy < N; iy++) {
        for (let iz = 0; iz < N; iz++) {
          const idx = ix * N * N + iy * N + iz;
          const raw = values[idx];
          const v = useLog ? Math.log10(Math.max(raw, 1e-30)) : raw;

          if (Math.abs(v - threshold) > width) continue;

          const t = (v - vmin) / (vmax - vmin);
          const [r, g, b] = sampleColormap(cmap, t);
          const mat = new THREE.MeshLambertMaterial({
            color: new THREE.Color(r/255, g/255, b/255),
            transparent: true,
            opacity: 0.85,
          });
          const mesh = new THREE.Mesh(geo, mat);
          mesh.position.set((ix+0.5)/N-0.5, (iy+0.5)/N-0.5, (iz+0.5)/N-0.5);
          volumeGroup.add(mesh);
        }
      }
    }
  }
}

function updateColorbar(label, vmin, vmax, cmapName, useLog) {
  const bar = document.getElementById('colorbar');
  const stops = [];
  for (let i = 0; i <= 10; i++) {
    const [r, g, b] = sampleColormap(cmapName, i / 10);
    stops.push(`rgb(${r|0},${g|0},${b|0}) ${i*10}%`);
  }
  bar.style.background = `linear-gradient(to right, ${stops.join(',')})`;
  document.getElementById('colorbar-label').textContent = label;
  const fmt = (v) => useLog ? `10^${v.toFixed(1)}` : v.toPrecision(3);
  document.getElementById('cb-min').textContent = fmt(vmin);
  document.getElementById('cb-max').textContent = fmt(vmax);
}

// --- Orbit controls (manual) ---
let isDragging = false;
let prevMouse = { x: 0, y: 0 };
let spherical = { theta: Math.PI / 4, phi: Math.PI / 4, radius: 3 };

function updateCamera() {
  camera.position.x = spherical.radius * Math.sin(spherical.phi) * Math.cos(spherical.theta);
  camera.position.y = spherical.radius * Math.cos(spherical.phi);
  camera.position.z = spherical.radius * Math.sin(spherical.phi) * Math.sin(spherical.theta);
  camera.lookAt(0, 0, 0);
}

renderer.domElement.addEventListener('mousedown', (e) => {
  isDragging = true;
  prevMouse = { x: e.clientX, y: e.clientY };
});

renderer.domElement.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  const dx = e.clientX - prevMouse.x;
  const dy = e.clientY - prevMouse.y;
  spherical.theta -= dx * 0.005;
  spherical.phi = Math.max(0.1, Math.min(Math.PI - 0.1, spherical.phi - dy * 0.005));
  prevMouse = { x: e.clientX, y: e.clientY };
  updateCamera();
});

renderer.domElement.addEventListener('mouseup', () => isDragging = false);
renderer.domElement.addEventListener('mouseleave', () => isDragging = false);

renderer.domElement.addEventListener('wheel', (e) => {
  spherical.radius *= e.deltaY > 0 ? 1.1 : 0.9;
  spherical.radius = Math.max(1, Math.min(10, spherical.radius));
  updateCamera();
  e.preventDefault();
}, { passive: false });

// Touch support
renderer.domElement.addEventListener('touchstart', (e) => {
  isDragging = true;
  prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
});
renderer.domElement.addEventListener('touchmove', (e) => {
  if (!isDragging || !e.touches[0]) return;
  const dx = e.touches[0].clientX - prevMouse.x;
  const dy = e.touches[0].clientY - prevMouse.y;
  spherical.theta -= dx * 0.005;
  spherical.phi = Math.max(0.1, Math.min(Math.PI - 0.1, spherical.phi - dy * 0.005));
  prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  updateCamera();
  e.preventDefault();
}, { passive: false });
renderer.domElement.addEventListener('touchend', () => isDragging = false);

// --- UI callbacks ---
function setTracer(name) {
  currentTracer = name;
  document.querySelectorAll('.tracer-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.tracer === name));
  buildVolume();
}

function setView(mode) {
  viewMode = mode;
  document.querySelectorAll('.view-btn').forEach(b =>
    b.classList.toggle('active', false));
  // Highlight matching button
  event.target.classList.add('active');
  buildVolume();
}

function updateOpacity(val) {
  opacityScale = val / 100;
  document.getElementById('opacity-val').textContent = opacityScale.toFixed(2);
  buildVolume();
}

function updateSlice(val) {
  slicePosition = val / 100;
  document.getElementById('slice-val').textContent = Math.round(val) + '%';
  if (viewMode.startsWith('slice')) buildVolume();
}

function updateIso(val) {
  isoLevel = val / 100;
  document.getElementById('iso-val').textContent = Math.round(val) + '%';
  if (viewMode === 'iso') buildVolume();
}

function updateBrightness(val) {
  brightnessScale = val / 100;
  document.getElementById('bright-val').textContent = brightnessScale.toFixed(1);
  buildVolume();
}

function loadPreset(name) {
  switch(name) {
    case 'density':
      setTracer('n_H'); viewMode = 'volume'; opacityScale = 0.5; break;
    case 'chemistry':
      setTracer('x_H2'); viewMode = 'volume'; opacityScale = 0.7; break;
    case 'dust':
      setTracer('f_nano'); viewMode = 'volume'; opacityScale = 0.8; break;
    case 'emission':
      setTracer('Gamma_PE'); viewMode = 'volume'; opacityScale = 0.6; break;
  }
  buildVolume();
}

// --- Build tracer buttons ---
const btnContainer = document.getElementById('tracer-buttons');
for (const [key, meta] of Object.entries(modelData)) {
  const btn = document.createElement('button');
  btn.className = 'tracer-btn' + (key === currentTracer ? ' active' : '');
  btn.textContent = meta.label.split(' ')[0].replace('[', '').replace(']', '');
  btn.dataset.tracer = key;
  btn.onclick = () => setTracer(key);
  btnContainer.appendChild(btn);
}

// --- Animation loop ---
function animate() {
  requestAnimationFrame(animate);
  // Gentle auto-rotation when not dragging
  if (!isDragging) {
    spherical.theta += 0.001;
    updateCamera();
  }
  renderer.render(scene, camera);
}

// --- Resize ---
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- Init ---
updateCamera();
buildVolume();
animate();
</script>
